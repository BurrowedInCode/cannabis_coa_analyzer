services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cannabis_coa_analyzer
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
  server: 
    build: .
    ports:
      - "8080:8080"
    env_file:
      - server/.env
    depends_on:
      - postgres
volumes:
  postgres_data:
